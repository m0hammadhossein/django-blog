<div class="collapse navbar-collapse justify-content-end nav" id="navbarResponsive">
    <ul class="navbar-nav ms-auto py-4 py-lg-0">
        <li class="nav-item">
            <a class="nav-link px-lg-3 py-3 py-lg-4" href="{% url 'blog:home' %}">خانه</a>
        </li>
        {% for cat in category %}
            {% if cat.parent == None %}
                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4"
                       href="{% url 'blog:category' cat.slug %}">{{ cat.title }}</a>
                    {% if cat.children.active.exists %}
                        {% include 'partials/category_loop.html' %}
                    {% endif %}
                </li>
            {% endif %}
        {% endfor %}
    </ul>
    <form class="form-inline d-flex" action="{% url 'blog:search' %}">
        <input type="text" name="q" class="form-control" placeholder="متن جستجو">
        <button class="btn btn-success">جستجو</button>
    </form>
</div>
