{% extends "star_ratings/widget_base.html" %}
{% block rating_detail %}
    {% if not user.is_authenticated and request.resolver_match.url_name == 'detail' %}
        <div>
            برای رای دادن باید
            <a class="badge bg-primary" href="{% url 'accounts:login' %}?next={{ request.path }}">وارد</a>
            شوید.
        </div>
    {% endif %}
{% endblock %}
